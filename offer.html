<section class="offer-section">

    <form class="ride-form" onsubmit="offerRide(event)">

          <label>Seat Price</label>

      <a href="index.html" class="find-btn btn-large" style="display: block; text-align: center; margin-top: 10px; padding: 12px; text-decoration: none;">Back to Home</a>

  </div>
</section>

  <script>
// Set minimum date to today

dateInput.setAttribute("min", today);
</script>

<script>
function setupAutocomplete(inputId) {
  const input = document.getElementById(inputId);
  let dropdown = null;

  input.addEventListener("input", async function () {
    const query = input.value.trim();
    if (query.length < 3) {
      if (dropdown) dropdown.remove();
      return;
    }

    const res = await fetch(
      `https://api.locationiq.com/v1/autocomplete?key=YOUR_LOCATIONIQ_TOKEN&q=${encodeURIComponent(query)}&countrycodes=in&limit=5`
    );
    const results = await res.json();

    if (dropdown) dropdown.remove();
    dropdown = document.createElement("ul");
    dropdown.style.cssText = `
      position: absolute; background: #1a1a1a; border: 1px solid #ffb000;
      border-radius: 8px; list-style: none; padding: 0; margin: 0;
      z-index: 1000; width: ${input.offsetWidth}px; max-height: 200px; overflow-y: auto;
    `;

    results.forEach(place => {
      const li = document.createElement("li");
      li.textContent = place.display_name;
      li.style.cssText = "padding: 10px 14px; color: white; cursor: pointer; font-size: 13px; border-bottom: 1px solid #333;";
      li.addEventListener("mouseenter", () => li.style.background = "#333");
      li.addEventListener("mouseleave", () => li.style.background = "transparent");
      li.addEventListener("click", () => {
        input.value = place.display_name;
        dropdown.remove();
        dropdown = null;
      });
      dropdown.appendChild(li);
    });

    input.parentElement.style.position = "relative";
    input.parentElement.appendChild(dropdown);
  });

  document.addEventListener("click", (e) => {
    if (dropdown && !input.contains(e.target)) {
      dropdown.remove();
      dropdown = null;
    }
  });
}

setupAutocomplete("pickup");
setupAutocomplete("drop");
</script>
