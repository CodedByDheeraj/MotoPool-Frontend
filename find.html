<script>
function setupAutocomplete(inputId) {
  const input = document.getElementById(inputId);
  let dropdown = null;

  input.addEventListener("input", async function () {
    const query = input.value.trim();
    if (query.length < 3) {
      if (dropdown) dropdown.remove();
      return;
    }

    const res = await fetch(
      `https://api.locationiq.com/v1/autocomplete?key=pk.9f902df33860fcb5c76439efaf0a6b9f&q=${encodeURIComponent(query)}&countrycodes=in&limit=5`
    );
    const results = await res.json();

    if (dropdown) dropdown.remove();
    dropdown = document.createElement("ul");
    dropdown.style.cssText = `
      position: absolute; background: #1a1a1a; border: 1px solid #ffb000;
      border-radius: 8px; list-style: none; padding: 0; margin: 0;
      z-index: 1000; width: ${input.offsetWidth}px; max-height: 200px; overflow-y: auto;
    `;

    results.forEach(place => {
      const li = document.createElement("li");
      li.textContent = place.display_name;
      li.style.cssText = "padding: 10px 14px; color: white; cursor: pointer; font-size: 13px; border-bottom: 1px solid #333;";
      li.addEventListener("mouseenter", () => li.style.background = "#333");
      li.addEventListener("mouseleave", () => li.style.background = "transparent");
      li.addEventListener("click", () => {
        input.value = place.display_name;
        dropdown.remove();
        dropdown = null;
      });
      dropdown.appendChild(li);
    });

    input.parentElement.style.position = "relative";
    input.parentElement.appendChild(dropdown);
  });

  document.addEventListener("click", (e) => {
    if (dropdown && !input.contains(e.target)) {
      dropdown.remove();
      dropdown = null;
    }
  });
}

setupAutocomplete("searchPickup");
setupAutocomplete("searchDrop");
</script>

<script>
async function fetchMyLocation(inputId, btnId) {
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);

  if (!navigator.geolocation) {
    alert("Your browser doesn't support location access.");
    return;
  }

  btn.textContent = "⏳";
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      try {
        const res = await fetch(
          `https://api.locationiq.com/v1/reverse?key=pk.9f902df33860fcb5c76439efaf0a6b9f&lat=${lat}&lon=${lon}&format=json`
        );
        const data = await res.json();

        // Build a clean address from the response
        const addr = data.address;
        const parts = [
          addr.neighbourhood || addr.suburb,
          addr.city_district || addr.county,
          addr.city || addr.town || addr.village,
          addr.state
        ].filter(Boolean);

        input.value = parts.join(", ");
        btn.textContent = "✅";
        setTimeout(() => {
          btn.textContent = "📍";
          btn.disabled = false;
        }, 2000);

      } catch (err) {
        alert("Could not get address. Try typing manually.");
        btn.textContent = "📍";
        btn.disabled = false;
      }
    },
    (error) => {
      if (error.code === error.PERMISSION_DENIED) {
        alert("⚠️ Location permission denied. Please allow location access in your browser settings.");
      } else {
        alert("Could not get your location. Try typing manually.");
      }
      btn.textContent = "📍";
      btn.disabled = false;
    },
    { timeout: 10000 }
  );
}
</script>
