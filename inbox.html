<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MotoPool Inbox</title>

    <link rel="stylesheet" href="style.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            background:#111827;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .chat-container{

            width:95%;

            max-width:900px;

            height:90vh;

            background:#1f2937;

            border-radius:20px;

            overflow:hidden;

            display:flex;

            flex-direction:column;

            border:1px solid #374151;
        }


#messagesArea{

    flex:1;

    overflow-y:auto;

    padding:25px;

    display:flex;

    flex-direction:column;

    gap:10px;

    background:
    radial-gradient(circle at top,#1e3a5f 0%,#0b1730 40%,#071226 100%);
}

.message{

    max-width:68%;

    padding:12px 16px;

    border-radius:18px;

    background:#374151;

    color:white;

    align-self:flex-start;

    position:relative;

    animation:fadeIn .25s ease;
}

.message.own{

    background:#ffb000;

    color:#111;

    align-self:flex-end;
}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(8px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.chat-input-area{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px;
}



.avatar{

    width:50px;

    height:50px;

    border-radius:50%;

    overflow:hidden;

    background:#374151;

    display:flex;

    align-items:center;

    justify-content:center;

}

.avatar img{

    width:100%;

    height:100%;

    object-fit:cover;

}

.message-time{

    margin-top:6px;

    font-size:11px;

    opacity:.7;

    text-align:right;

}

.message.own .message-time{

    color:#333;

}

.message:not(.own) .message-time{

    color:#cbd5e1;

}

.empty-chat{

margin:auto;

text-align:center;

color:#94a3b8;

}

.empty-chat h2{

margin-top:15px;

color:white;

}

.empty-chat p{

margin-top:8px;

}

#messageInput{

    flex:1;

    height:52px;

    padding:0 20px;

    border:none;

    border-radius:30px;

    background:#374151;

    color:white;

    font-size:15px;

}

#sendBtn{

    width:58px;
    height:58px;

    flex-shrink:0;

    border-radius:50%;

    border:none;

    background:#ffb000;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:24px;
}

#sendBtn:hover{

transform:scale(1.08);

box-shadow:0 0 20px rgba(255,176,0,.4);

}

#rideCard{

    margin:12px;

    padding:12px 18px;

    background:#1f2937;

    border:1px solid #374151;

    border-radius:15px;

    color:white;

    display:none;
}

#rideCard h4{

    color:#ffb000;

    margin-bottom:10px;
}

.ride-info{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:8px;

    font-size:14px;
}


    </style>

</head>

<body>

<div class="chat-container">

    <div class="chat-header">

        <div class="header-left">

            <div class="avatar">
                <img
                    id="chatAvatar"
                    src="images/profile.png"
                    alt="Profile">
            </div>

            <div>

                <h3 id="chatName">MotoPool Chat</h3>

                <p id="chatRole">Loading...</p>

            </div>

        </div>

        <button
            class="back-btn"
            onclick="history.back()">
            ← Back
        </button>

    </div>

    <!-- Header ke niche -->
    <div id="rideCard"></div>

    <!-- Sirf EK messagesArea -->
    <div id="messagesArea"></div>

    <div class="chat-input-area">

        <input
            type="text"
            id="messageInput"
            placeholder="Type message...">

        <button id="sendBtn">
            ➤
        </button>

    </div>

</div>

<script src="https://motopool-backend.onrender.com/socket.io/socket.io.js"></script>
<script src="chat.js"></script>

</body>

</html>
